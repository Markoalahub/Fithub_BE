<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Fithub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f6f8fa;
            color: #24292e;
        }

        header {
            background: white;
            border-bottom: 1px solid #e1e4e8;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        header .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        header .logout-btn {
            padding: 0.5rem 1rem;
            background: #f1f1f1;
            border: 1px solid #d1d1d1;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            color: #24292e;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        header .logout-btn:hover {
            background: #e8e8e8;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .welcome {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #e1e4e8;
            margin-bottom: 2rem;
        }

        .welcome h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .welcome p {
            color: #586069;
            line-height: 1.5;
        }

        .repos-section {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #e1e4e8;
        }

        .repos-section h3 {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .repo-card {
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 1.5rem;
            transition: box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .repo-card:hover {
            border-color: #0366d6;
            box-shadow: 0 3px 12px rgba(3, 102, 214, 0.1);
        }

        .repo-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #0366d6;
        }

        .repo-visibility {
            display: inline-block;
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            background: #f1f8ff;
            border: 1px solid #c8e1ff;
            border-radius: 12px;
            margin-left: 0.5rem;
        }

        .repo-description {
            color: #586069;
            font-size: 0.95rem;
            line-height: 1.4;
            margin: 1rem 0;
            min-height: 40px;
        }

        .repo-meta {
            font-size: 0.85rem;
            color: #6a737d;
            line-height: 1.6;
            border-top: 1px solid #e1e4e8;
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6a737d;
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
            color: #24292e;
        }
    </style>
</head>
<body>
<header>
    <h1>🚀 Fithub</h1>
    <div class="user-info">
        <span th:text="${#authentication != null ? #authentication.name : 'Guest'}">User</span>
        <form action="/logout" method="POST" style="display: inline;">
            <button type="submit" class="logout-btn">로그아웃</button>
        </form>
    </div>
</header>

<div class="container">
    <div class="welcome">
        <h2>환영합니다!</h2>
        <p>Fithub에서 프로젝트와 이슈를 관리하세요.</p>
    </div>

    <div class="repos-section">
        <h3>📁 내 레포지토리 목록</h3>
        <div class="repos-grid">
            <!-- repos가 있으면 표시 -->
            <div th:if="${repos != null and !#lists.isEmpty(repos)}" th:each="repo : ${repos}" class="repo-card">
                <div class="repo-name" th:text="${repo.name}"></div>
                <span class="repo-visibility" th:text="${repo.private} ? '🔒 Private' : '🌐 Public'"></span>

                <div class="repo-description" th:utext="${repo.description != null ? repo.description : 'N/A'}"></div>

                <div class="repo-meta">
                    🏷️ <span th:text="'언어: ' + ${repo.language != null ? repo.language : 'N/A'}"></span> &nbsp;|&nbsp;
                    🐛 <span th:text="'이슈: ' + ${repo.openIssuesCount}"></span>
                    <br/>
                    📅 <span th:text="'생성일: ' + ${#strings.substring(repo.createdAt, 0, 10)}"></span> &nbsp;|&nbsp;
                    ♻️ <span th:text="'최종 업데이트: ' + ${#strings.substring(repo.updatedAt, 0, 10)}"></span>
                </div>
            </div>

            <!-- repos가 없으면 빈 상태 표시 -->
            <div class="empty-state" th:if="${repos == null or #lists.isEmpty(repos)}">
                <h3>레포지토리가 없습니다</h3>
                <p>GitHub에서 레포지토리를 생성하거나 연결해주세요.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 토큰이 URL 파라미터로 전달되었을 경우 localStorage에 저장
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    if (token) {
        localStorage.setItem('authToken', token);
        // 쿼리 파라미터 제거
        window.history.replaceState({}, document.title, window.location.pathname);
    }
</script>
</body>
</html>
